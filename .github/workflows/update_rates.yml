name: Update Currency Rates

on:
  schedule:
    - cron: '0 * * * *'      # Каждый час
  workflow_dispatch:         # Можно запускать вручную

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update currency rates
        env:
          CURRENCY_BEACON_API_KEY: ${{ secrets.CURRENCY_BEACON_API_KEY }}
        run: node scripts/update-rates.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data/rates.json data/history.json
          git commit -m "Update currency rates - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
